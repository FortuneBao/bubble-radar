<svg width="64" height="64" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Bubble Radar favicon">
  <defs>
    <linearGradient id="fdragon" x1="22%" y1="12%" x2="90%" y2="100%">
      <stop offset="0%" stop-color="#3ce8ad"/>
      <stop offset="58%" stop-color="#23c98c"/>
      <stop offset="100%" stop-color="#ff3145"/>
    </linearGradient>
    <radialGradient id="fseep" cx="85%" cy="90%" r="70%">
      <stop offset="0%" stop-color="#ff2f44" stop-opacity="0.5"/>
      <stop offset="70%" stop-color="#0d2b24" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <circle cx="32" cy="32" r="31" fill="#0d2b24"/>
  <circle cx="32" cy="32" r="31" fill="url(#fseep)"/>
  <g stroke="#1f5c4d" stroke-width="1.2" fill="none">
    <circle cx="32" cy="32" r="22"/>
    <circle cx="32" cy="32" r="11"/>
  </g>

  <g stroke="#0c3326" stroke-width="2" stroke-linejoin="round" stroke-linecap="round">
    <!-- shoulders -->
    <path d="M19 60 q-1 -12 7 -18 q8 -5 16 0 q6 6 6 18 Z" fill="url(#fdragon)"/>
    <path d="M27 60 q-1 -9 5 -13 q5 -3 9 1 q4 5 4 12 Z" fill="#eafff7" stroke-width="1.5"/>
    <!-- head -->
    <path d="M32 13 c-11 0 -17 7 -17 16 c0 9 7 15 17 15 c10 0 17 -6 17 -15 c0 -9 -6 -16 -17 -16 Z" fill="url(#fdragon)"/>
    <!-- horns -->
    <path d="M27 14 q-2 -8 2 -12 q1 4 4 6 q-3 2 -2 7 Z" fill="#ffd23f" stroke-width="1.6"/>
    <path d="M36 13 q1 -8 6 -11 q-2 4 -1 7 q-3 1 -3 5 Z" fill="#ffd23f" stroke-width="1.6"/>
    <!-- fins -->
    <path d="M18 28 q-5 -2 -7 2 q4 0 5 3 q0 -3 2 -5 Z" fill="#23b07b" stroke-width="1.6"/>
    <path d="M46 28 q5 -2 7 2 q-4 0 -5 3 q0 -3 -2 -5 Z" fill="#23b07b" stroke-width="1.6"/>
    <!-- brow -->
    <path d="M22 30 q5 -2 10 0" fill="none" stroke-width="1.8"/>
    <path d="M32 30 q5 -2 10 0" fill="none" stroke-width="1.8"/>
    <!-- bean eyes -->
    <circle cx="27" cy="34" r="4" fill="#ffffff" stroke-width="1.4"/>
    <circle cx="37" cy="34" r="4" fill="#ffffff" stroke-width="1.4"/>
    <circle cx="28" cy="35" r="2.1" fill="#14110b" stroke="none"/>
    <circle cx="36" cy="35" r="2.1" fill="#14110b" stroke="none"/>
    <circle cx="29" cy="34" r="0.8" fill="#ffffff" stroke="none"/>
    <circle cx="37" cy="34" r="0.8" fill="#ffffff" stroke="none"/>
    <!-- nostrils + mouth -->
    <circle cx="29" cy="39" r="0.9" fill="#0c3326" stroke="none"/>
    <circle cx="35" cy="39" r="0.9" fill="#0c3326" stroke="none"/>
    <path d="M27 42 q5 3 10 0" fill="none" stroke-width="1.6"/>
  </g>

  <!-- magnifier -->
  <g stroke="#0c3326" stroke-width="1.8" stroke-linejoin="round" stroke-linecap="round">
    <line x1="53" y1="55" x2="45" y2="47" stroke="#9c6238" stroke-width="3.2"/>
    <circle cx="43" cy="45" r="7.2" fill="#dffbef" fill-opacity="0.5" stroke="#11261f" stroke-width="2.4"/>
    <path d="M43 41 L43 48 M40 45 L43 49 L46 45" stroke="#ff2f44" stroke-width="1.5" fill="none"/>
  </g>

  <!-- ring -->
  <path d="M32 2 A30 30 0 0 1 60 28" fill="none" stroke="#2ee6a6" stroke-width="2.4" stroke-linecap="round"/>
  <path d="M60 28 A30 30 0 0 1 32 62" fill="none" stroke="#ff2f44" stroke-width="2.4" stroke-linecap="round" opacity="0.85"/>
</svg>
