<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Bubble Radar logo — a cartoon dragon scientist with a magnifying glass">
  <defs>
    <radialGradient id="radarGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0a1f1a" stop-opacity="0"/>
      <stop offset="100%" stop-color="#0a1f1a" stop-opacity="0.4"/>
    </radialGradient>
    <clipPath id="dish"><circle cx="200" cy="200" r="172"/></clipPath>
    <linearGradient id="sweep" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2ee6a6" stop-opacity="0.42"/>
      <stop offset="100%" stop-color="#2ee6a6" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="redSeep" cx="88%" cy="92%" r="78%">
      <stop offset="0%" stop-color="#ff2f44" stop-opacity="0.5"/>
      <stop offset="40%" stop-color="#c23a3f" stop-opacity="0.25"/>
      <stop offset="72%" stop-color="#0d2b24" stop-opacity="0"/>
    </radialGradient>
    <!-- simple two-stop greens with red creeping bottom-right -->
    <linearGradient id="dragonGrad" x1="22%" y1="12%" x2="90%" y2="100%">
      <stop offset="0%" stop-color="#3ce8ad"/>
      <stop offset="55%" stop-color="#23c98c"/>
      <stop offset="80%" stop-color="#4fb682"/>
      <stop offset="100%" stop-color="#ff3145"/>
    </linearGradient>
    <radialGradient id="glass" cx="38%" cy="32%" r="72%">
      <stop offset="0%" stop-color="#eafff7" stop-opacity="0.5"/>
      <stop offset="60%" stop-color="#9fe3cb" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.04"/>
    </radialGradient>
  </defs>

  <!-- ===== Radar field ===== -->
  <circle cx="200" cy="200" r="180" fill="#0d2b24"/>
  <circle cx="200" cy="200" r="180" fill="url(#radarGlow)"/>
  <circle cx="200" cy="200" r="180" fill="url(#redSeep)"/>
  <g stroke="#1f5c4d" stroke-width="2" fill="none">
    <circle cx="200" cy="200" r="172"/>
    <circle cx="200" cy="200" r="128"/>
    <circle cx="200" cy="200" r="84"/>
    <circle cx="200" cy="200" r="40"/>
  </g>
  <g stroke="#1f5c4d" stroke-width="2">
    <line x1="28" y1="200" x2="372" y2="200"/>
    <line x1="200" y1="28" x2="200" y2="372"/>
  </g>
  <g clip-path="url(#dish)">
    <path d="M200 200 L200 28 A172 172 0 0 1 360 140 Z" fill="url(#sweep)"/>
    <line x1="200" y1="200" x2="200" y2="28" stroke="#2ee6a6" stroke-width="2.5" stroke-opacity="0.85"/>
  </g>
  <circle cx="130" cy="120" r="4" fill="#2ee6a6" opacity="0.75"/>
  <circle cx="250" cy="96" r="3" fill="#2ee6a6" opacity="0.6"/>
  <circle cx="314" cy="278" r="4.5" fill="#ff2f44" opacity="0.9"/>
  <circle cx="294" cy="320" r="3.5" fill="#ff2f44" opacity="0.7"/>
  <circle cx="328" cy="242" r="3" fill="#ff2f44" opacity="0.65"/>

  <!-- ============ CARTOON DRAGON (simple, sturdy, male) ============ -->
  <g stroke="#0c3326" stroke-width="3.5" stroke-linejoin="round" stroke-linecap="round">

    <!-- ===== Shoulders / chest (cropped at bottom) ===== -->
    <path d="M120 374
             q-2 -58 30 -82
             q50 -30 100 0
             q32 24 30 82 Z" fill="url(#dragonGrad)"/>
    <!-- chest belly plate -->
    <path d="M158 374 q-2 -40 18 -56 q24 -14 48 0 q20 16 18 56 Z" fill="#eafff7" stroke-width="2.5"/>

    <!-- ===== Neck (between shoulders and head) ===== -->
    <path d="M172 230
             q28 20 56 0
             l-3 56
             q-25 16 -50 0 Z" fill="url(#dragonGrad)"/>

    <!-- ===== Head: rounded but with cheeks/jaw, not a perfect circle ===== -->
    <path d="M200 104
             c-40 0 -66 24 -68 56
             c-1 22 8 40 26 50
             c12 7 20 10 42 10
             c22 0 30 -3 42 -10
             c18 -10 27 -28 26 -50
             c-2 -32 -28 -56 -68 -56 Z" fill="url(#dragonGrad)"/>

    <!-- ===== Two small horns/spikes on top + simple mane tuft ===== -->
    <path d="M176 108 q-6 -26 6 -40 q4 14 12 20 q-10 8 -6 22 Z" fill="#ffd23f" stroke-width="3"/>
    <path d="M210 104 q4 -28 20 -36 q-6 14 -2 24 q-10 4 -10 18 Z" fill="#ffd23f" stroke-width="3"/>

    <!-- ===== Ears / side fins ===== -->
    <path d="M132 150 q-22 -10 -30 6 q16 0 24 12 q1 -10 6 -18 Z" fill="#23b07b" stroke-width="3"/>
    <path d="M268 150 q22 -10 30 6 q-16 0 -24 12 q-1 -10 -6 -18 Z" fill="#23b07b" stroke-width="3"/>

    <!-- ===== Brow (straight, masculine) ===== -->
    <path d="M158 158 q20 -6 40 0" fill="none" stroke-width="4"/>
    <path d="M202 158 q20 -6 40 0" fill="none" stroke-width="4"/>

    <!-- ===== Eyes: simple round black bean eyes, no lashes, no big iris ===== -->
    <circle cx="178" cy="178" r="13" fill="#ffffff" stroke-width="2.5"/>
    <circle cx="222" cy="178" r="13" fill="#ffffff" stroke-width="2.5"/>
    <circle cx="180" cy="181" r="7" fill="#14110b" stroke="none"/>
    <circle cx="220" cy="181" r="7" fill="#14110b" stroke="none"/>
    <circle cx="182" cy="178" r="2.4" fill="#ffffff" stroke="none"/>
    <circle cx="222" cy="178" r="2.4" fill="#ffffff" stroke="none"/>

    <!-- ===== Snout: subtle nostril dots + simple friendly mouth (no pig nose, no tooth) ===== -->
    <circle cx="192" cy="202" r="2.4" fill="#0c3326" stroke="none"/>
    <circle cx="208" cy="202" r="2.4" fill="#0c3326" stroke="none"/>
    <path d="M178 212 q22 16 44 0" fill="none" stroke-width="3.5"/>

  </g>

  <!-- ============ Magnifying glass (held, pointing down) ============ -->
  <g stroke="#0c3326" stroke-width="3" stroke-linejoin="round" stroke-linecap="round">
    <!-- claw holding it -->
    <path d="M238 290 q18 -2 28 14 q6 12 -6 18 q-10 -16 -28 -20 Z" fill="#23c98c" stroke-width="3"/>
    <!-- handle -->
    <line x1="308" y1="336" x2="272" y2="294" stroke="#7a4a2b" stroke-width="12"/>
    <line x1="308" y1="336" x2="272" y2="294" stroke="#a06a3c" stroke-width="5" stroke-linecap="round"/>
    <!-- lens -->
    <circle cx="258" cy="280" r="32" fill="url(#glass)" stroke="#11261f" stroke-width="6.5"/>
    <!-- red down arrow through lens -->
    <path d="M258 268 L258 288 M250 280 L258 290 L266 280" stroke="#ff2f44" stroke-width="3.2" fill="none" opacity="0.9"/>
    <path d="M242 264 q12 -6 26 4" fill="none" stroke="#ffffff" stroke-width="2.6" opacity="0.55"/>
  </g>

  <!-- ===== Outer ring ===== -->
  <circle cx="200" cy="200" r="180" fill="none" stroke="#1f5c4d" stroke-width="4"/>
  <path d="M200 20 A180 180 0 0 1 374 156" fill="none" stroke="#2ee6a6" stroke-width="5" stroke-linecap="round"/>
  <path d="M374 156 A180 180 0 0 1 200 380" fill="none" stroke="#ff2f44" stroke-width="5" stroke-linecap="round" opacity="0.85"/>
</svg>
